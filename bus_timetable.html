<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>マイバス時刻表</title>
<style>
  :root{
    --brand:#0056b3; --bg:#f4f7f6; --card:#fff; --ink:#20262c; --sub:#6b7480;
    --line:#e5e8ea; --line2:#eef1f2; --next:#0056b3; --tag:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;
    font-family:ui-monospace,'SF Mono',Menlo,monospace}
  header{background:var(--brand);color:#fff;padding:14px 15px;font-size:18px;font-weight:800;
    text-align:center;letter-spacing:.02em}
  .wrap{max-width:520px;margin:0 auto;padding:14px 14px 40px}

  .controls{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px}
  label.lbl{font-size:11px;font-weight:800;color:var(--sub);letter-spacing:.1em;display:block;margin-bottom:6px}
  select{width:100%;font:inherit;font-size:16px;font-weight:700;color:var(--ink);
    padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;-webkit-appearance:none;appearance:none}
  .seg{display:flex;gap:0;margin-top:11px;background:var(--line2);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{flex:1;border:0;background:transparent;color:var(--sub);font:inherit;font-weight:800;font-size:14px;
    padding:8px 0;border-radius:7px;cursor:pointer}
  .seg button[aria-pressed="true"]{background:#fff;color:var(--brand);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .hint{font-size:11px;color:var(--sub);margin-top:8px;line-height:1.5}

  .next{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;
    display:flex;align-items:center;gap:14px;margin-bottom:12px}
  .next .lab{font-size:10px;letter-spacing:.2em;color:var(--sub);font-weight:800}
  .next .time{font-size:34px;font-weight:800;line-height:1;color:var(--next)}
  .next .meta{font-size:12px;color:var(--sub);margin-top:4px}
  .next .cd{margin-left:auto;text-align:right;white-space:nowrap}
  .next .cd b{font-size:22px;font-weight:800}
  .next .cd span{font-size:10px;color:var(--sub);display:block;letter-spacing:.12em;margin-top:2px}
  .next.done .time{font-size:17px;color:var(--sub)}
  .nn{font-size:12px;color:var(--sub);margin:-4px 2px 12px;padding-left:2px}
  .nn b{color:var(--ink);font-weight:800}

  .list{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow-y:auto;max-height:55vh}
  .r{display:flex;align-items:center;gap:10px;padding:11px 15px;border-top:1px solid var(--line2)}
  .r:first-child{border-top:0}
  .r.past{opacity:.4}
  .r.now{background:#eaf2fb}
  .r .t{font-size:17px;font-weight:800;width:64px;flex:none}
  .r.now .t{color:var(--next)}
  .r .tag{font-size:11px;font-weight:800;color:var(--tag);background:rgba(192,57,43,.09);
    padding:2px 7px;border-radius:6px}
  .r .home{font-size:11px;color:var(--sub)}
  .r .badge{margin-left:auto;font-size:10px;font-weight:800;color:var(--next);letter-spacing:.12em}
  .foot{margin-top:14px;font-size:11px;color:var(--sub);line-height:1.7}
</style>
</head>
<body>
<header>マイバス時刻表</header>
<div class="wrap">
  <div class="controls">
    <label class="lbl" for="stop">停留所・方面</label>
    <select id="stop"></select>
    <div class="seg" role="group" aria-label="ダイヤ">
      <button id="d-weekday" aria-pressed="false">平日</button>
      <button id="d-weekend" aria-pressed="false">土日祝</button>
    </div>
    <div class="hint">祝日は「土日祝」を手動で選んでください。</div>
  </div>

  <div class="next" id="next"></div>
  <div class="nn" id="nn"></div>
  <div class="list" id="list"></div>

  <div class="foot" id="foot"></div>
</div>

<script>
/* ===== データ =====
   青森駅行き（その停留所の基準方向）は時刻だけ "HH:MM"。
   それ以外は {t:"HH:MM", note:"路線コード"}。時刻は早い順。 */

 "自衛隊前（古川方面）":{
  weekday:[
   {t:"06:23",note:"C10"},"06:38","06:58",{t:"07:13",note:"K34"},"07:27","07:41",
   {t:"08:01",note:"60"},"08:33",{t:"08:43",note:"C12"},"09:13",{t:"09:15",note:"C10"},"09:41",
   {t:"10:35",note:"K37"},"10:58",{t:"11:07",note:"C12"},{t:"11:42",note:"C10"},{t:"12:05",note:"C10"},
   "12:43","12:52","13:12",{t:"13:57",note:"C10"},"14:17",{t:"14:38",note:"C10"},"15:06","15:32",
   "16:10","16:28",{t:"16:49",note:"60"},"17:15","17:41",{t:"18:28",note:"C12"},"18:49","19:18","19:47","20:20"
  ],
  weekend:[
   {t:"06:32",note:"C10"},{t:"07:08",note:"60"},"07:12",{t:"07:21",note:"Kシ"},"08:13",{t:"08:34",note:"60"},
   "08:46",{t:"08:58",note:"C10"},"09:24",{t:"09:33",note:"60"},"09:50","10:19","11:21","12:07","12:38","12:58",
   {t:"13:25",note:"C10"},{t:"13:42",note:"C10"},"13:53","14:33","15:08","15:50","16:13","16:28",
   {t:"16:51",note:"60"},"17:17","17:58","18:17","18:40","19:11","19:24","19:59","20:35","20:52"
  ]
 },
 "自衛隊宿舎入口（古川方面）":{
  weekday:[{t:"07:18",note:"C10"},{t:"08:10",note:"C10"},"09:56","10:46"],
  weekend:[ "07:38",{t:"08:22",note:"C10"},"09:41","10:50"]
 },
 "青森駅前（浪館方面）":{
  weekday:[
   {t:"07:06",note:"S51"},{t:"07:13",note:"P40"},{t:"08:04",note:"S51"},{t:"08:25",note:"P40"},
   {t:"09:15",note:"S51"},{t:"09:35",note:"P40"},{t:"09:59",note:"S51"},{t:"10:05",note:"P41"},
   {t:"10:22",note:"P40"},{t:"11:00",note:"P51"},{t:"11:22",note:"P40"},{t:"11:44",note:"P41"},
   {t:"11:50",note:"S51"},{t:"12:27",note:"P40"},{t:"12:57",note:"S51"},{t:"13:05",note:"P40"},
   {t:"14:05",note:"S51"},{t:"14:40",note:"P40"},{t:"15:00",note:"P51"},{t:"15:30",note:"P40"},
   {t:"15:51",note:"P41"},{t:"16:12",note:"P51"},{t:"16:53",note:"P40"},{t:"17:08",note:"S51"},
   {t:"17:30",note:"P41"},{t:"18:00",note:"P40"},{t:"18:15",note:"P51"},{t:"19:30",note:"P40"},
   {t:"19:45",note:"P41"},{t:"20:05",note:"P40"},{t:"20:57",note:"P40"}
  ],
  weekend:[
   {t:"07:19",note:"P40"},{t:"08:02",note:"P40"},{t:"08:07",note:"S51"},{t:"08:47",note:"S51"},
   {t:"09:01",note:"P40"},{t:"09:33",note:"P40"},{t:"09:55",note:"S51"},{t:"10:28",note:"P41"},
   {t:"10:57",note:"P51"},{t:"11:43",note:"P41"},{t:"12:05",note:"P40"},{t:"12:35",note:"S51"},
   {t:"12:40",note:"P40"},{t:"13:06",note:"P40"},{t:"13:08",note:"S51"},{t:"13:35",note:"P41"},
   {t:"14:10",note:"S51"},{t:"14:23",note:"P40"},{t:"14:47",note:"P51"},{t:"15:00",note:"P40"},
   {t:"15:40",note:"P40"},{t:"15:58",note:"P51"},{t:"16:03",note:"P41"},{t:"17:22",note:"S51"},
   {t:"17:30",note:"P40"},{t:"17:48",note:"P40"},{t:"18:00",note:"P51"},{t:"18:27",note:"P40"},
   {t:"19:02",note:"P40"},{t:"19:05",note:"S51"},{t:"19:42",note:"P41"},{t:"19:51",note:"P40"},{t:"20:50",note:"P40"}
  ]
 },
 "青森駅前（シ・ガ方面）":{
  weekday:[
   {t:"07:35",note:"M35"},{t:"08:35",note:"M35"},{t:"09:40",note:"M35"},{t:"09:47",note:"M35"},
   {t:"10:03",note:"T50"},{t:"10:35",note:"M35"},{t:"11:24",note:"T50"},{t:"11:35",note:"M35"},
   {t:"11:46",note:"T50"},{t:"12:35",note:"M35"},{t:"13:35",note:"M35"},{t:"14:18",note:"M35"},
   {t:"14:35",note:"M35"},{t:"15:17",note:"T50"},{t:"15:35",note:"M35"},{t:"16:30",note:"M35"},
   {t:"17:45",note:"M35"},{t:"18:33",note:"M35"},{t:"19:35",note:"M35"},{t:"20:35",note:"M35"}
  ],
  weekend:[
   {t:"07:40",note:"M35"},{t:"08:10",note:"T50"},{t:"08:35",note:"M35"},{t:"09:12",note:"T50"},
   {t:"09:35",note:"M35"},{t:"09:37",note:"T50"},{t:"10:40",note:"M35"},{t:"11:40",note:"M35"},
   {t:"12:29",note:"M35"},{t:"13:20",note:"M35"},{t:"14:12",note:"T50"},{t:"14:35",note:"M35"},
   {t:"15:09",note:"T50"},{t:"15:35",note:"M35"},{t:"16:06",note:"T50"},{t:"16:45",note:"M35"},
   {t:"17:40",note:"M35"},{t:"18:12",note:"T50"},{t:"18:40",note:"M35"},{t:"19:35",note:"M35"},{t:"20:35",note:"M35"}
  ]
 },
 "浪館（古川方面）":{
  weekday:[
   {t:"06:24",note:"C10"},"06:39","06:59",{t:"07:14",note:"K34"},{t:"07:22",note:"C10"},"07:28","07:42",
   {t:"08:02",note:"60"},{t:"08:14",note:"C10"},"08:34",{t:"08:44",note:"C12"},"09:14",{t:"09:16",note:"C10"},
   "09:42","09:59",{t:"10:36",note:"K37"},"10:49","10:59",{t:"11:08",note:"C12"},{t:"11:43",note:"C10"},
   {t:"12:06",note:"C10"},"12:44","12:53","13:13","13:29",{t:"13:58",note:"C10"},"14:18",{t:"14:39",note:"C10"},
   "15:07","15:33","16:11","16:29",{t:"16:50",note:"60"},"17:16","17:42",{t:"18:29",note:"C12"},"18:50",
   "19:19","19:48","20:21"
  ],
  weekend:[
   {t:"06:33",note:"C10"},{t:"07:09",note:"60"},"07:13",{t:"07:22",note:"Kシ"},"07:40","08:14",
   {t:"08:24",note:"C10"},{t:"08:35",note:"60"},"08:47",{t:"08:59",note:"C10"},"09:25",{t:"09:34",note:"60"},
   "09:43","09:51","10:20","10:52","11:22","12:08","12:39","12:59","13:16",{t:"13:26",note:"C10"},
   {t:"13:43",note:"C10"},"13:54","14:34","15:09","15:51","16:06","16:14","16:29",{t:"16:52",note:"60"},
   "17:18","17:59","18:18","18:41","19:12","19:25","20:00","20:36","20:53"
  ]
 },
 "浪館（シーナシーナ方面）":{
  weekday:[{t:"10:01",note:"シ"},{t:"14:32",note:"シ"}],
  weekend:[{t:"10:00",note:"シ"},{t:"14:21",note:"シ"}]
 }
};

/* ===== ロジック ===== */
const $=id=>document.getElementById(id);
const eT=e=>typeof e==="string"?e:e.t;
const eN=e=>typeof e==="string"?"":(e.note||"");
const toSec=s=>{const[h,m]=s.split(":").map(Number);return h*3600+m*60;};
const pad=n=>String(n).padStart(2,"0");

let stop=null, day=null, lastNextIdx=-2;

function initStops(){
  const sel=$("stop");
  Object.keys(busData).forEach(k=>{const o=document.createElement("option");o.value=k;o.textContent=k;sel.appendChild(o);});
  let saved=null; try{saved=localStorage.getItem("busStop");}catch(e){}
  stop=(saved&&busData[saved])?saved:Object.keys(busData)[0];
  sel.value=stop;
  sel.onchange=()=>{stop=sel.value;try{localStorage.setItem("busStop",stop);}catch(e){}buildList();tick(true);};
}
function initDay(){
  const wd=[0,6].includes(new Date().getDay())?"weekend":"weekday";
  setDay(wd,false);
  $("d-weekday").onclick=()=>setDay("weekday",true);
  $("d-weekend").onclick=()=>setDay("weekend",true);
}
function setDay(d,rebuild){
  day=d;
  $("d-weekday").setAttribute("aria-pressed",d==="weekday");
  $("d-weekend").setAttribute("aria-pressed",d==="weekend");
  if(rebuild){buildList();tick(true);}
}
function times(){return busData[stop][day];}

function buildList(){
  const list=$("list"); list.innerHTML="";
  times().forEach((e,i)=>{
    const note=eN(e);
    const row=document.createElement("div");
    row.className="r"; row.dataset.i=i;
    row.innerHTML=`<span class="t num">${eT(e)}</span>`+
      (note?`<span class="tag">${note}</span>`:`<span class="home">青森駅</span>`)+
      `<span class="badge" style="visibility:hidden">次発</span>`;
    list.appendChild(row);
  });
}

function fmtCD(sec){
  if(sec>=3600){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return `${h}時間${m}分`;}
  if(sec>=60){const m=Math.floor(sec/60),s=sec%60;return `${m}分${pad(s)}秒`;}
  return `${sec}秒`;
}

function tick(force){
  const now=new Date(); const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  const arr=times();
  let ni=-1;
  for(let i=0;i<arr.length;i++){if(toSec(eT(arr[i]))>nowSec){ni=i;break;}}

  // next card
  const nx=$("next"), nn=$("nn");
  if(ni>=0){
    const e=arr[ni], note=eN(e);
    nx.className="next";
    nx.innerHTML=`<div><div class="lab">次のバス</div>
      <div class="time num">${eT(e)}</div>
      <div class="meta">${note?note+" 系統":"青森駅ゆき"}</div></div>
      <div class="cd"><b class="num">${fmtCD(toSec(eT(e))-nowSec)}</b><span>後</span></div>`;
    const af=arr[ni+1];
    nn.innerHTML=af?`次々発 <b class="num">${eT(af)}</b>${eN(af)?" ("+eN(af)+")":""}`:"";
  }else{
    nx.className="next done";
    nx.innerHTML=`<div><div class="lab">次のバス</div><div class="time">本日の運行は終了しました</div></div>`;
    nn.innerHTML="";
  }

  // row states (only rebuild highlight when index changed)
  if(force||ni!==lastNextIdx){
    lastNextIdx=ni;
    [...$("list").children].forEach((row,i)=>{
      row.classList.toggle("now", i===ni);
      row.classList.toggle("past", ni>=0 && i<ni);
      const b=row.querySelector(".badge");
      if(b) b.style.visibility = (i===ni)?"visible":"hidden";
    });
    const cur=$("list").querySelector(".r.now");
    if(cur) cur.scrollIntoView({block:"center",behavior:force?"auto":"smooth"});
  }
}

initStops();
initDay();
buildList();
tick(true);
setInterval(()=>tick(false),1000);

document.getElementById("foot").innerHTML =
 "路線コード: P40=慈恵会病院 / P41=細越 / P51=三内丸山(浪館) / S51=三内丸山(県美) / M35=シーナシーナ(浜田循環) / T50=ガーラ(西部) / C10・C12・60・K34・K37・Kシ=各系統（シ＝シーナシーナ経由）。<br>"+
 "「青森駅」表記は青森駅ゆき。時刻は通過予定で交通事情により前後します。";
</script>
</body>
</html>
